<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07070f" />
    <meta
      name="description"
      content="Slotly — an AI booking assistant that turns conversations into confirmed appointments. Real-time availability, zero double-bookings, scheduling that never sleeps."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>Slotly — AI Booking Assistant</title>

    <!--
      Paint the correct theme before first render. Without this the page flashes
      the default theme for a frame while React boots. Must stay in sync with
      resolveTheme() in src/lib/theme.tsx.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('slotly-theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark';
          if (theme === 'dark') document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
